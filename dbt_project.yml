name: streamcart_dbt
version: '1.0.0'
config-version: 2

profile: streamcart_dbt

seed-paths: ["seeds"]
model-paths: ["models"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  # Builds seeds into '<your_schema_name>_raw'
  streamcart_dbt:
    channel_mapping:
      +column_types:
        channel_code: varchar(20)
        is_digital: boolean
    country_config:
      +column_types:
        tax_rate_pct: float
  

models:
  streamcart_dbt:

    staging:
      +materialized: view
      +schema: STAGING

    intermediate:
      +materialized: ephemeral

    marts:

      core:
        +materialized: table
        +schema: CORE

      reporting:
        +materialized: table
        +schema: REPORTING


on-run-start:
  - >
      CREATE TABLE IF NOT EXISTS {{ target.schema }}.dbt_run_log (
        run_id VARCHAR,
        started_at TIMESTAMP,
        target_name VARCHAR
      )

  - >
      INSERT INTO {{ target.schema }}.dbt_run_log
      (run_id, started_at, target_name)
      SELECT
        '{{ invocation_id }}',
        CURRENT_TIMESTAMP(),
        '{{ target.name }}'

on-run-end:
  - >
      GRANT SELECT ON ALL TABLES IN SCHEMA {{ target.schema }}
      TO ROLE reporting_role