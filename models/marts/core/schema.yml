version: 2

models:
  - name: dim_customers
    description: "{{ doc('streamcart_pipeline') }}"

    meta:
      owner: "data-eng@streamcart.com"
      contains_pii: true
      refresh_frequency: "daily"

    columns:
      - name: customer_id
        description: "Unique identifier for the customer."

      - name: customer_name
        description: "Customer full name."

      - name: email
        description: "Customer email address."

      - name: phone
        description: "Customer phone number."

      - name: customer_tier
        description: "Current membership tier of the customer."

      - name: city
        description: "Customer city."

      - name: country_code
        description: "Country code of the customer."

      - name: total_orders
        description: "Total number of orders placed by the customer."

      - name: total_gross_revenue
        description: "Total gross revenue generated by the customer."

      - name: total_net_revenue
        description: "Total revenue after discounts."

      - name: avg_order_value
        description: "Average value of each order."
        tests:
          - dbt_expectations.expect_column_mean_to_be_between:
              arguments:
                min_value: 0
                max_value: 100000

      - name: customer_segment
        description: "Customer segment based on spending."

      - name: days_since_last_order
        description: "Number of days since the last purchase."

      - name: country_name
        description: "Customer country."

      - name: region
        description: "Geographical region."

      - name: currency_default
        description: "Default currency for the country."

  - name: fct_orders
    description: "Fact table containing order level transactional data."

    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          arguments:
            min_value: 1000

    meta:
      owner: "data-eng@streamcart.com"
      contains_pii: true
      refresh_frequency: "daily"

    columns:
      - {name: order_line_key, description: "Surrogate key for each order line."}
      - {name: event_id, description: "Unique event identifier."}
      - {name: order_id, description: "Unique order identifier."}
      - {name: customer_id, description: "Customer identifier."}
      - {name: customer_name, description: "Customer name."}
      - {name: customer_tier, description: "Customer tier."}
      - {name: city, description: "Customer city."}
      - {name: product_id, description: "Product identifier."}
      - {name: product_name, description: "Product name."}
      - {name: category, description: "Product category."}
      - {name: sub_category, description: "Product sub category."}
      - {name: brand, description: "Product brand."}
      - {name: margin_pct, description: "Product profit margin percentage."}
      - {name: is_low_stock, description: "Indicates whether stock is low."}
      - {name: order_date, description: "Date when the order was placed."}
      - {name: channel, description: "Sales channel."}
      - {name: channel_label, description: "Readable channel name."}
      - {name: channel_group, description: "Channel grouping."}
      - {name: currency_code, description: "Transaction currency."}
      - {name: payment_method, description: "Payment method."}
      - {name: payment_status, description: "Payment status."}
      - {name: quantity, description: "Quantity purchased."}
      - {name: unit_price, description: "Price per unit."}
      - {name: discount_pct, description: "Discount percentage."}
      - {name: gross_amount, description: "Gross order amount."}
      - {name: net_amount, description: "Net amount after discount."}
      - {name: effective_margin_pct, description: "Effective margin after discount."}